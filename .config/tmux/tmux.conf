set -g default-shell /usr/bin/zsh
set -gu default-command

# ── Terminal ───────────────────────────────────────────────
set -g default-terminal "xterm-ghostty"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours (tmux 3.0+)
set -g allow-passthrough all
set -ga update-environment "KITTY_WINDOW_ID"

# ── General ───────────────────────────────────────────────
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g monitor-activity on
set -g visual-activity off
set -g exit-empty off
set -g exit-unattached off

# ── Window titles ─────────────────────────────────────────
set -g set-titles on
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ── Prefix ────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Sessions ──────────────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -d -s '%1' \; switch-client -t '%1'"
bind Q confirm-before -p "Kill session #S? (y/n)" kill-session
bind M-s display-popup -E -T "[ Save session ]" "~/.config/tmux/scripts/session_save.sh"
bind M-l display-popup -E -T "[ Load session ]" "~/.config/tmux/scripts/session_load.sh"
bind M-S display-popup -E -w 80% -h 80% -T "[ Edit sessions ]" "nvim ~/.tmuxp/"

# ── Windows ───────────────────────────────────────────────
bind -n M-T new-window -c "#{pane_current_path}"
bind -n M-H previous-window
bind -n M-L next-window
bind -n M-S-Left  swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1
bind d kill-window
bind k confirm kill-window
bind M choose-tree -Zs "move-window -t '%%'"

# ── Panes ─────────────────────────────────────────────────
unbind %
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind J command-prompt -p "Join pane from window:" "join-pane -h -s ':%%'"

# ── Misc ──────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded!'
bind h display-popup -E -w 100 -h 56 -T " Cheatsheet " "~/.config/tmux/scripts/cheatsheet.sh"
bind K confirm kill-server

# ── Theme (Catppuccin) ────────────────────────────────────
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "basic"
run ~/.config/tmux/plugins/tmux/catppuccin.tmux
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# ── Plugins ───────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'f'
set -g @floax-width '80%'
set -g @floax-height '80%'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -ag status-right "#{prefix_highlight}"
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'red'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_sync_prompt 'Sync'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-hook-pre-pane-process 'tmux switch-client -n && tmux kill-session -t=resurrect'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# @TODO: check https://github.com/fcsonline/tmux-thumbs

# ── Screensaver ───────────────────────────────────────────
set -ag status-right '#(~/.config/tmux/screensaver/check.sh)'
bind Escape new-window -n matrix "~/.config/tmux/screensaver/start.sh"

# ── TPM (keep last) ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

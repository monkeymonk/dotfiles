[mgr]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 8
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap       = "yes"
tab_size   = 4
max_width  = 1200
max_height = 1200

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" }
]

open = [
  { run = 'xdg-open "$1"', orphan = true, for = "linux" }
]

reveal = [
  { run = 'xdg-open "$(dirname "$1")"', orphan = true, for = "linux" }
]
